name: Build and push mod-sshd

on:
  push:
    branches: [main]
    paths:
      - mods/sshd/**
      - .github/workflows/mod-sshd.yml

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: mods/sshd
          push: true
          tags: ghcr.io/dtinth/devtop-sshd:latest
          platforms: linux/amd64,linux/arm64
