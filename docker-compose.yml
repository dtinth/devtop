services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: ${DEVBOX_NAME}
    environment:
      - TS_HOSTNAME=${DEVBOX_NAME}
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_AUTH_ONCE=true
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:9002
      - TZ=${TZ:-UTC}
    volumes:
      - tailscale-state:/var/lib/tailscale
      - tailscale-socket:/var/run/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - net_raw
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9002/healthz"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 5s
    mem_limit: ${TS_MEM_LIMIT:-512m}
    restart: unless-stopped

  tailscale-serve-init:
    image: tailscale/tailscale:latest
    network_mode: service:tailscale
    volumes:
      - tailscale-socket:/var/run/tailscale
    depends_on:
      tailscale:
        condition: service_healthy
        restart: true
    command: tailscale serve --bg --https=443 http://localhost:3000
    restart: "no"

  webtop:
    image: lscr.io/linuxserver/webtop:debian-xfce
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_healthy
        restart: true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-UTC}
      - TITLE=${DEVBOX_NAME}
    volumes:
      - config:/config
    shm_size: "1gb"
    mem_limit: ${WEBTOP_MEM_LIMIT:-2g}
    memswap_limit: ${WEBTOP_MEMSWAP_LIMIT:-8g}
    tmpfs:
      - /tmp:exec,size=2048M
    security_opt:
      - seccomp=unconfined
    restart: unless-stopped

volumes:
  config:
  tailscale-state:
  tailscale-socket:
